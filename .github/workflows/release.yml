name: Release

# Publishes to npm with provenance whenever a semver tag (vX.Y.Z) is pushed.
#
# Setup required once: add an `NPM_TOKEN` repo secret (an npm "Automation"
# token, or a granular token scoped to publish this package).
#
# RECOMMENDED ALTERNATIVE — npm Trusted Publishing (OIDC):
#   npm now supports OIDC "trusted publishers", which lets you publish WITHOUT
#   storing a long-lived NPM_TOKEN secret at all. Configure this repo + workflow
#   as a trusted publisher in the package settings on npmjs.com, then you can
#   drop the `NODE_AUTH_TOKEN` line below. Provenance is attested either way via
#   `id-token: write`. See: https://docs.npmjs.com/trusted-publishers

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  # Required for npm provenance attestation (and for OIDC trusted publishing).
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (expo-module build — src + plugin)
        run: npm run build

      # `--provenance` requires `id-token: write` (above) and npm CLI >= 9.5
      # (bundled with Node 20). `--access public` publishes the unscoped package
      # publicly. NODE_AUTH_TOKEN is consumed automatically by setup-node's
      # generated .npmrc; omit it once Trusted Publishing (OIDC) is configured.
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
